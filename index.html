<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        #webcam-container canvas {
            display: none;
            border-radius: 8px;
        }
        #webcam-container.active canvas {
            display: block;
        }
        #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
        }
        button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
        }
        button.stop { background: #dc2626; }
        button:hover { opacity: 0.9; }
        #message {
            font-size: 3em;
            text-align: center;
        }
        #score {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>My Teachable Machine App</h1>
    <h1><div id="message"></div></h1>
    <h1><div id="score"></div></h1>
    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>
    <button id="toggleButton" onclick="toggleGame()">Start Game</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // REPLACE THIS with your model URL from Teachable Machine:
        const URL = "https://teachablemachine.withgoogle.com/models/EZsy2nrJo/";

        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;
        let currentPose = "";
        let score = 0;

        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            isRunning = true;
            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            const scoreEl = document.getElementById("score");

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > topClass.probability) {
                    topClass = prediction[i];
                }
            }

            // topClass.className is the winning label
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            // Update the display
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }


            if (topClass.className === currentPose && topClass.probability > 0.8) {
                document.body.style.backgroundColor = "#4ade80"; // green
                score++;
                scoreEl.textContent = `Points: ${score}`;
            } else {
                document.body.style.backgroundColor = "#f87171"; // red
            }
        }

        function setPose() {
            const messageEl = document.getElementById("message");
            const options = ["standing", "sitting", "empty"];
            setTimeout(() => {
                currentPose = '';
                messageEl.textContent = "New pose is:";
            }, 2000);
            setTimeout(() => {
                currentPose = options[Math.floor(Math.random()*3)]
                if (currentPose === 'empty') {
                    messageEl.textContent = 'Leave the camera!';
                }
                else if (currentPose === 'standing') {
                    messageEl.textContent = 'Standing!';
                }
                else if (currentPose === 'sitting') {
                    messageEl.textContent = ' Sitting!';
                }
            }, 4000);
        }

        async function toggleGame() {
            setInterval(setPose, 4000)
        }

        async function toggleCamera() {
            if (!isRunning) {
                await init();
                button.textContent = "Stop Camera";
                button.classList.add("stop");
            } else {
                isRunning = false;
                webcam.stop();
                document.getElementById("webcam-container").classList.remove("active");
                button.textContent = "Start Camera";
                button.classList.remove("stop");
            }
        }
    </script>
</body>
</html>
